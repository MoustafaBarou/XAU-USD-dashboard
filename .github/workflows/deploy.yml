# CI build check only. Deployment is handled by Vercel, NOT GitHub Pages.
# This workflow just verifies the app installs and builds cleanly on every push.
name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Supabase vars are provided by Vercel at deploy time; the build
          # tolerates their absence (client falls back to a safe placeholder),
          # so CI can build without secrets. Add them here only if you want CI
          # to build against real values.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
